name: PR Automation

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - labeled
      - unlabeled

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-automation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-loop:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check out workflow tools
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          path: .workflow-tools
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Auto-fix pass
        id: autofix
        run: |
          set +e
          python .workflow-tools/scripts/pr_automation.py --repo-root "$GITHUB_WORKSPACE" --tool-root "$GITHUB_WORKSPACE/.workflow-tools" --apply-fixes --report-path "$GITHUB_WORKSPACE/pr-automation-report.md"
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit auto-fixes
        id: commit
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add -A
          git commit -m "chore: automated PR fixes"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Validation pass
        id: validate
        run: |
          set +e
          python .workflow-tools/scripts/pr_automation.py --repo-root "$GITHUB_WORKSPACE" --tool-root "$GITHUB_WORKSPACE/.workflow-tools" --report-path "$GITHUB_WORKSPACE/pr-automation-report.md"
          echo "status=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish report comment
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ github.workspace }}/pr-automation-report.md
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-automation-report -->";
            const body = fs.existsSync(process.env.REPORT_PATH)
              ? fs.readFileSync(process.env.REPORT_PATH, "utf8")
              : `${marker}\n# PR Automation Report\n\n- Overall: UNKNOWN\n- Auto fixes: none\n\n## Checks\n- report: missing`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enable automerge when labeled
        if: steps.validate.outputs.status == '0' && !github.event.pull_request.draft
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            if (!labels.includes("automerge")) {
              core.info("automerge label not present");
              return;
            }
            const { owner, repo } = context.repo;
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: context.payload.pull_request.number,
              merge_method: "squash",
            });

      - name: Fail when unresolved issues remain
        if: steps.validate.outputs.status != '0'
        run: exit 1
